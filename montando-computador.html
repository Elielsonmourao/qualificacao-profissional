<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquiteto de Hardware</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; }
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: none;
    align-items: center;
    justify-content: center;
    color: white;
}
</style>
</head>

<body class="bg-gray-100">

<div id="loader" class="loading-overlay">
    Salvando na nuvem...
</div>

<div class="p-6 max-w-4xl mx-auto">

<h1 class="text-2xl font-bold mb-4">Arquiteto de Hardware</h1>

<input id="student_name" placeholder="Seu nome" class="border p-2 w-full mb-4">

<textarea data-field="resposta" placeholder="Digite algo..." class="border p-2 w-full mb-4"></textarea>

<button id="save" class="bg-blue-600 text-white px-4 py-2">Salvar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFeeau4kFJSydnpgtwvo-mV4Fc3uEymko",
  authDomain: "montando-computador.firebaseapp.com",
  projectId: "montando-computador",
  storageBucket: "montando-computador.firebasestorage.app",
  messagingSenderId: "460426886679",
  appId: "1:460426886679:web:718b09877a0ec6b1186652"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = null;

/* LOGIN ANÔNIMO */
signInAnonymously(auth);

onAuthStateChanged(auth, async (user) => {
    if (user) {
        userId = user.uid;
        console.log("Logado:", userId);
        loadData();
    }
});

/* SALVAR */
async function saveData() {

    const nome = document.getElementById("student_name").value;

    if (!nome) {
        alert("Digite seu nome!");
        return;
    }

    if (!userId) {
        alert("Aguarde conexão...");
        return;
    }

    document.getElementById("loader").style.display = "flex";

    const payload = {
        nome,
        resposta: document.querySelector("[data-field]").value,
        data: new Date().toISOString()
    };

    try {
        await setDoc(doc(db, "alunos", userId), payload);
        alert("Salvo com sucesso!");
    } catch (e) {
        console.error(e);
        alert("Erro ao salvar!");
    }

    document.getElementById("loader").style.display = "none";
}

/* CARREGAR */
async function loadData() {
    const ref = doc(db, "alunos", userId);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        const data = snap.data();
        document.getElementById("student_name").value = data.nome || "";
        document.querySelector("[data-field]").value = data.resposta || "";
    }
}

document.getElementById("save").addEventListener("click", saveData);

</script>

</body>
</html>
